id: btw
name: Bundestagswahl
hashtag: "#btw"

scraper:
  function: get_surveys
  # get_surveys() fetches all pollsters from wahlrecht.de internally — no URL needed

parliament:
  seats: 630
  majority: 316
  hurdle: 0.05
  seat_allocation: sls

pooling:
  period: 14

parties:
  - id: cdu
    label: Union
    color: "#000000"
    required: true
  - id: spd
    label: SPD
    color: "#E3000F"
    required: true
  - id: afd
    label: AfD
    color: "#82caff"
    required: true
  - id: greens
    label: Grüne
    color: "#46962b"
    required: false
  - id: fdp
    label: FDP
    color: "#ffed00"
    required: false
  - id: left
    label: Linke
    color: "#ff1493"
    required: false
  - id: bsw
    label: BSW
    color: "#6d1f99"
    required: false
  - id: others
    label: Sonstige
    color: "#808080"
    required: false

pollsters:
  - allensbach
  - civey
  - emnid
  - forsa
  - fgw
  - gms
  - infratest
  - insa

coalitions:
  # AfD-led (mathematically viable, politically ruled out)
  - parties: [afd]
    label: "AfD"
    color: "#82caff"
  - parties: [afd, cdu]
    label: "AfD-Union"
    color: "#82caff"
  # CDU-led
  - parties: [cdu, spd]
    label: "Union-SPD"
    color: "#000000"
  - parties: [cdu, greens]
    label: "Union-Grüne"
    color: "#000000"
  - parties: [cdu, fdp]
    label: "Union-FDP"
    color: "#000000"
  - parties: [cdu, spd, greens]
    label: "Union-SPD-Grüne"
    color: "#000000"
  - parties: [cdu, greens, fdp]
    label: "Union-Grüne-FDP"
    color: "#000000"
  - parties: [cdu, spd, fdp]
    label: "Union-SPD-FDP"
    color: "#000000"
  - parties: [cdu, bsw]
    label: "Union-BSW"
    color: "#000000"
  # SPD-led
  - parties: [spd, greens]
    label: "SPD-Grüne"
    color: "#E3000F"
  - parties: [spd, greens, fdp]
    label: "SPD-Grüne-FDP"
    color: "#E3000F"
  - parties: [spd, greens, left]
    label: "SPD-Grüne-Linke"
    color: "#E3000F"
  - parties: [spd, greens, bsw]
    label: "SPD-Grüne-BSW"
    color: "#E3000F"

analyses:
  biggest_party:
    - parties: [cdu, spd, afd]
      label: "Wer wird stärkste Kraft?"
  pass_hurdle:
    parties: [greens, fdp, left, bsw]
    label: "Schaffen es die folgenden Parteien in den Bundestag?"
