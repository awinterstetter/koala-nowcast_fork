name: Scrape, Pool and Compute

on:
  push:
    branches:
  schedule:
    - cron: '0 7 * * *'   # daily at 07:00 UTC
  workflow_dispatch:        # allow manual trigger

jobs:
  compute:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - uses: actions/checkout@v4

      - name: Download previous surveys artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          name: survey-data
          path: data/surveys/
          if_no_artifact_found: warn
          workflow_conclusion: success

      - name: Download previous results artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          name: results-data
          path: data/results/
          if_no_artifact_found: warn
          workflow_conclusion: success

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2

      - name: Scrape and pool polls
        id: scrape
        run: |
          result=$(Rscript -e '
            source("scripts/scrape_polls.R")
            configs <- list.files("config/elections", pattern = "\\.yml$", full.names = TRUE)
            new_data <- any(sapply(configs, scrape_election))
            cat(new_data)
          ')
          echo "new_data=$result" >> $GITHUB_OUTPUT

      - name: Compute coalition probabilities
        if: steps.scrape.outputs.new_data == 'TRUE'
        run: |
          Rscript -e '
            library(coalitions); library(dplyr); library(tidyr); library(yaml); library(jsonlite)
            source("scripts/calc_coalProbs_helpers.R")
            source("scripts/calc_coalProbs.R")
            configs <- list.files("config/elections", pattern = "\\.yml$", full.names = TRUE)
            invisible(lapply(configs, calc_coalProbs))
          '

      - name: Upload surveys artifact
        if: steps.scrape.outputs.new_data == 'TRUE'
        uses: actions/upload-artifact@v4
        with:
          name: survey-data
          path: data/surveys/
          overwrite: true

      - name: Upload results artifact
        if: steps.scrape.outputs.new_data == 'TRUE'
        uses: actions/upload-artifact@v4
        with:
          name: results-data
          path: data/results/
          overwrite: true
