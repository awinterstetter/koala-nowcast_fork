name: Scrape, Pool and Compute

on:
  push:
    branches: [webscraping]
  schedule:
    - cron: '0 7 * * *'   # daily at 07:00 UTC
  workflow_dispatch:        # allow manual trigger

jobs:
  compute:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2

      - name: Scrape and pool polls
        id: scrape
        run: |
          result=$(Rscript -e '
            source("scripts/scrape_polls.R")
            configs <- list.files("config/elections", pattern = "\\.yml$", full.names = TRUE)
            new_data <- any(sapply(configs, scrape_election))
            cat(new_data)
          ')
          echo "new_data=$result" >> $GITHUB_OUTPUT

      - name: Commit updated polls and pooled data
        if: steps.scrape.outputs.new_data == 'TRUE'
        run: |
          git config user.name "KOALA Bot"
          git config user.email "koala-bot@users.noreply.github.com"
          git add data/surveys/
          git diff --staged --quiet || git commit -m "chore: scrape and pool polls $(date -I)"
          git push

      - name: Compute coalition probabilities
        if: steps.scrape.outputs.new_data == 'TRUE'
        run: |
          Rscript -e '
            library(coalitions); library(dplyr); library(tidyr); library(yaml); library(jsonlite)
            source("scripts/calc_coalProbs_helpers.R")
            source("scripts/calc_coalProbs.R")
            configs <- list.files("config/elections", pattern = "\\.yml$", full.names = TRUE)
            invisible(lapply(configs, calc_coalProbs))
          '

      - name: Commit computed results
        if: steps.scrape.outputs.new_data == 'TRUE'
        run: |
          git add data/results/
          git diff --staged --quiet || git commit -m "chore: compute coalition probs $(date -I)"
          git push
