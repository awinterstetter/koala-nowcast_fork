name: Scrape Polls

on:
  push:
    branches: [webscraping]
  schedule:
    - cron: '0 7 * * *'   # daily at 07:00 UTC
  workflow_dispatch:        # allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2

      - name: Scrape polls
        id: scrape
        run: |
          result=$(Rscript -e '
            source("scripts/scrape_polls.R")
            configs <- list.files("config/elections", pattern = "\\.yml$", full.names = TRUE)
            new_data <- any(sapply(configs, scrape_election))
            cat(new_data)
          ')
          echo "new_data=$result" >> $GITHUB_OUTPUT

      - name: Commit new data
        if: steps.scrape.outputs.new_data == 'TRUE'
        run: |
          git config user.name "KOALA Bot"
          git config user.email "koala-bot@users.noreply.github.com"
          git add data/surveys/
          git commit -m "chore: update poll data $(date -I)"
          git push
