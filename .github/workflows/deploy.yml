name: Deploy Website

on:
  workflow_run:
    workflows: ["Scrape, Pool and Compute"]
    types: [completed]
  workflow_dispatch:

permissions:
  pages: write
  id-token: write
  actions: read

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Download results artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          name: results-data
          path: data/results/
          workflow_conclusion: success

      - name: Download surveys artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          name: survey-data
          path: data/surveys/
          workflow_conclusion: success

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2

      - name: Prepare dashboard data
        run: Rscript st-dashboard/prepare_data.R

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Render dashboard
        run: quarto render st-dashboard/index.qmd --output-dir _site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: st-dashboard/_site

      - uses: actions/deploy-pages@v4
